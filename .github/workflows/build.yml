name: build

on:
  push:
    branches: ['**']
  pull_request:

# Node 20 deprecation uyarisini engelle: JS action'lari Node 24 ile calistir
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Derle + test + paketle (fat-jar)
        run: mvn -B -ntp clean verify

      - name: Fat-jar artifact yukle
        uses: actions/upload-artifact@v4
        with:
          name: autoclicker-jar
          path: target/autoclicker.jar
          if-no-files-found: error
