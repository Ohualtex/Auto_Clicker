name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

# Node 20 deprecation uyarisini engelle: JS action'lari Node 24 ile calistir
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Surum etiketi (v-onsuz)
        id: ver
        shell: bash
        run: echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Fat-jar derle + test
        run: mvn -B -ntp clean verify

      - name: Installer araclari (best-effort)
        continue-on-error: true
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then choco install wixtoolset -y --no-progress || true; fi
          if [ "${{ runner.os }}" = "Linux" ]; then sudo apt-get update && sudo apt-get install -y fakeroot || true; fi

      - name: jpackage app-image (JRE gomulu)
        shell: bash
        run: |
          jpackage --type app-image --input target --main-jar autoclicker.jar \
            --name AutoClicker --app-version "${{ steps.ver.outputs.v }}" --dest dist \
            --java-options "-Dfile.encoding=UTF-8"

      - name: app-image'i zip'le
        shell: bash
        run: |
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "../AutoClicker-${{ runner.os }}.zip" "AutoClicker" >/dev/null
          else
            zip -r "../AutoClicker-${{ runner.os }}.zip" AutoClicker* >/dev/null
          fi

      - name: jpackage native installer (msi/dmg/deb) - best-effort
        id: installer
        continue-on-error: true
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Windows) T=msi ;;
            macOS)   T=dmg ;;
            Linux)   T=deb ;;
          esac
          jpackage --type "$T" --input target --main-jar autoclicker.jar \
            --name AutoClicker --app-version "${{ steps.ver.outputs.v }}" --dest installer \
            --java-options "-Dfile.encoding=UTF-8"

      - name: Yayim dosyalari + SHA-256 checksum
        shell: bash
        run: |
          mkdir -p out
          cp "AutoClicker-${{ runner.os }}.zip" out/ 2>/dev/null || true
          if [ -d installer ]; then cp installer/* out/ 2>/dev/null || true; fi
          if [ "${{ runner.os }}" = "Linux" ]; then cp target/autoclicker.jar out/ 2>/dev/null || true; fi
          cd out
          for f in *; do
            [ -f "$f" ] || continue
            if command -v sha256sum >/dev/null 2>&1; then sha256sum "$f" > "$f.sha256"; else shasum -a 256 "$f" > "$f.sha256"; fi
          done
          ls -la

      # NOT: Kod imzalama icin bkz. asagidaki yorum bloku (sertifika/secret gerektirir; ucretsiz yol: checksum yukarida)
      - name: Release'e yukle
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: out/*
